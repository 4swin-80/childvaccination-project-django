<!DOCTYPE html>
<html>
<head>
    <title>e-ChildVaccine</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Fira Code', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;

            /* Animated Gradient */
            background: linear-gradient(-45deg,rgb(0, 0, 0),rgb(8, 22, 91),rgb(7, 78, 6),rgb(0, 0, 0));
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        /* Gradient Animation */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .home-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px;
            width: 420px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 60px rgba(0,0,0,0.25);
            animation: fadeInScale 0.8s ease forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Brand Title */
        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 30px;
            font-weight: 600;
            background: linear-gradient(45deg, #ffffff,rgb(255, 255, 255));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        .btn-portal {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login {
            background: linear-gradient(45deg,rgb(255, 255, 255),rgb(255, 255, 255));
            color:rgb(0, 0, 0);
        }
        .btn-login:hover {
            color: black !important;
        }        
        .btn-parent {
            background: linear-gradient(45deg,rgb(50, 0, 199),rgb(0, 0, 0));
            color: white;
        }

        .btn-hospital {
            background: linear-gradient(45deg,rgb(14, 133, 21),rgb(0, 0, 0));
            color: white;
        }

        .btn-portal:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        #metamorphous-regular {
            font-family: "Metamorphous", serif;
            font-weight: 800;
            font-style: normal;
          }         
    </style>
</head>

<body>

    <div class="home-card">

        <div class="brand-title" id="metamorphous-regular">
            💉E-ChildVac
        </div>
        <hr>
        <br>

        

        <a href="{% url 'login' %}" class="btn btn-portal btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </a>

        <a href="{% url 'parent_register' %}" class="btn btn-portal btn-parent">
            👨 Register as Parent
        </a>

        <a href="{% url 'hospital_register' %}" class="btn btn-portal btn-hospital">
            🏥 Register as Hospital
        </a>
        <br>
        <br>

        <div class="tagline">
            Smart • Secure • Digital Vaccination Management
        </div>
    </div>

</body>
</html>
