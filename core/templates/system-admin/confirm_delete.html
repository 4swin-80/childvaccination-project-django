<!DOCTYPE html>
<html>
<head>
    <title>Confirm Delete</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f5f3ff, #eef2ff);
            font-family: 'Segoe UI', sans-serif;
        }

        .delete-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeInScale 0.4s ease forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .danger-icon {
            font-size: 60px;
            color: #dc2626;
            margin-bottom: 15px;
        }

        .btn-danger-admin {
            background: linear-gradient(45deg, #dc2626, #ef4444);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-danger-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(220,38,38,0.4);
        }

        .btn-cancel-admin {
            background: linear-gradient(45deg, #4c1d95, #312e81);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-cancel-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76,29,149,0.3);
        }

    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 100vh;">

    <div class="col-md-5">

        <div class="delete-card">

            <div class="danger-icon">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </div>

            <h3 class="fw-bold text-danger mb-3">
                Confirm Deletion
            </h3>

            <p class="text-muted mb-4">
                Are you sure you want to permanently delete this parent?
                <br>
                <strong>This action cannot be undone.</strong>
            </p>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger-admin me-2">
                    <i class="bi bi-trash"></i> Yes, Delete
                </button>

                <a href="{% url 'admin_dashboard' %}"
                   class="btn btn-cancel-admin">
                    Cancel
                </a>
            </form>

        </div>

    </div>
</div>

</body>
</html>
