<!DOCTYPE html>
<html>
<head>
    <title>Edit Parent</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f5f3ff, #eef2ff);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar-admin {
            background: linear-gradient(90deg, #4c1d95, #312e81);
        }

        /* Card */
        .edit-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            animation: fadeInUp 0.7s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #4c1d95;
            box-shadow: 0 0 10px rgba(76,29,149,0.4);
        }

        textarea.form-control {
            resize: none;
        }

        /* Buttons */
        .btn-admin {
            background: linear-gradient(45deg, #4c1d95, #312e81);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-admin:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76,29,149,0.3);
        }

        .btn-back {
            background: linear-gradient(45deg, #6b7280, #9ca3af);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-back:hover {
            transform: translateX(-5px);
        }

    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-admin shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            👑 Edit Parent Account
        </span>

        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-light">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
    </div>
</nav>


<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 90vh;">

    <div class="col-md-6">

        <div class="edit-card">

            <h4 class="fw-bold text-primary text-center mb-4">
                ✏ Update Parent Information
            </h4>

            <form method="POST" id="editParentForm" novalidate>
                {% csrf_token %}

                <!-- Username -->
                <div class="form-floating mb-3">
                    <input type="text"
                           name="username"
                           value="{{ parent.username }}"
                           class="form-control"
                           placeholder="Username"
                           required>
                    <label>Username</label>
                </div>

                <!-- Phone -->
<div class="form-floating mb-3">
    <input type="tel"
           name="phone"
           value="{{ parent.phone }}"
           class="form-control"
           id="phone"
           placeholder="Phone"
           pattern="[0-9]{10}"
           maxlength="10"
           required>
    <label>Phone (10 digits)</label>

    <div class="invalid-feedback">
        Phone number must contain exactly 10 digits.
    </div>
</div>


                <!-- Address -->
                <div class="form-floating mb-4">
                    <textarea name="address"
                              class="form-control"
                              placeholder="Address"
                              style="height: 110px;"
                              required>{{ parent.address }}</textarea>
                    <label>Address</label>
                </div>

                <!-- Update Button -->
                <button type="submit" class="btn btn-admin w-100">
                    <i class="bi bi-check-circle"></i> Update Parent
                </button>

            </form>

            <div class="text-center mt-4">
                <a href="{% url 'admin_dashboard' %}" class="btn btn-back">
                    ⬅ Back
                </a>
            </div>

        </div>

    </div>
</div>

<script>
    const form = document.getElementById('editParentForm');
    const phoneInput = document.getElementById('phone');

    // Allow only digits while typing
    phoneInput.addEventListener('input', function () {
        phoneInput.value = phoneInput.value.replace(/\D/g, '');

        if (phoneInput.value.length === 10) {
            phoneInput.classList.remove('is-invalid');
            phoneInput.classList.add('is-valid');
        } else {
            phoneInput.classList.remove('is-valid');
        }
    });

    // Prevent submit if not exactly 10 digits
    form.addEventListener('submit', function (event) {
        if (phoneInput.value.length !== 10) {
            phoneInput.classList.add('is-invalid');
            event.preventDefault();
            event.stopPropagation();
        }

        form.classList.add('was-validated');
    });
</script>


</body>
</html>
