<!DOCTYPE html>
<html>
<head>
    <title>Add Child</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eaf4f8, #f6fbff);
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-custom {
            background: linear-gradient(90deg,rgba(0, 9, 102, 0.9),rgba(0, 82, 102, 0.9));
            backdrop-filter: blur(8px);
        }

        .form-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 119, 182, 0.15);
            padding: 40px;
            animation: fadeInUp 0.8s ease forwards;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
        }

        /* Medical Button */
        .btn-medical {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-medical:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.4);
        }

        /* Fade animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Shake animation for invalid */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .is-invalid {
            animation: shake 0.3s;
        }

        /* Success Glow */
        .is-valid {
            box-shadow: 0 0 10px rgba(56, 176, 0, 0.5) !important;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            🏥 Add Child
        </span>

        <div>
            <a href="{% url 'parent_dashboard' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="{% url 'logout' %}" class="btn btn-danger">
                <i class="bi bi-power"></i> Logout
            </a>
        </div>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 85vh;">

    <div class="col-md-6">
        <div class="form-card">

            <h3 class="text-center text-primary fw-bold mb-4">
                👶 Add Child Information
            </h3>

            <form method="post" id="childForm" novalidate>
                {% csrf_token %}

                <!-- Child Name -->
                <div class="form-floating mb-3">
                    <input type="text" name="name" class="form-control"
                           id="childName" placeholder="Child Name" required>
                    <label for="childName">Child Name</label>
                    <div class="invalid-feedback">
                        Please enter child's name.
                    </div>
                </div>

                <!-- Date of Birth -->
                <div class="form-floating mb-3">
                    <input type="date" name="dob" class="form-control"
                           id="dob" required>
                    <label for="dob">Date of Birth</label>
                    <div class="invalid-feedback">
                        Please select date of birth.
                    </div>
                </div>

                <!-- Gender Dropdown -->
                <div class="form-floating mb-3">
                    <select name="gender" class="form-select" id="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                    <label for="gender">Gender</label>
                    <div class="invalid-feedback">
                        Please select gender.
                    </div>
                </div>

                <!-- Blood Group Dropdown -->
                <div class="form-floating mb-4">
                    <select name="blood_group" class="form-select" id="bloodGroup" required>
                        <option value="">Select Blood Group</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>O+</option>
                        <option>O-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                    </select>
                    <label for="bloodGroup">Blood Group</label>
                    <div class="invalid-feedback">
                        Please select blood group.
                    </div>
                </div>

                <button type="submit" class="btn btn-medical w-100">
                    <i class="bi bi-save"></i> Save Child
                </button>

            </form>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script>
    // Bootstrap validation with animation
    const form = document.getElementById('childForm');

    form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }

        form.classList.add('was-validated');
    });
</script>

</body>
</html>
