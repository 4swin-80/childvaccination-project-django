<!DOCTYPE html>
<html>
<head>
    <title>Book Vaccination Appointment</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eaf4f8, #f6fbff);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(90deg,rgba(0, 9, 102, 0.9),rgba(0, 82, 102, 0.9));
            backdrop-filter: blur(8px);
        }

        /* Booking Card */
        .booking-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 119, 182, 0.15);
            padding: 40px;
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Fade Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input Styling */
        .form-select, .form-control {
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-select:focus, .form-control:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
        }

        /* Button */
        .btn-medical {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-medical:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.4);
        }

        /* Shake invalid animation */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .is-invalid {
            animation: shake 0.3s;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            💉 Book Appointment
        </span>

        <div>
            <a href="{% url 'parent_dashboard' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="{% url 'logout' %}" class="btn btn-danger">
                <i class="bi bi-power"></i> Logout
            </a>
        </div>
    </div>
</nav>


<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 85vh;">

    <div class="col-md-6">

        <div class="booking-card">

            <h3 class="text-center text-primary fw-bold mb-4">
                🏥 Vaccination Booking Form
            </h3>

            <form method="post" id="appointmentForm" novalidate>
                {% csrf_token %}

                <!-- CHILD -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">👶 Select Child</label>
                    <select name="child" class="form-select" required>
                        <option value="">Choose Child</option>
                        {% for c in children %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="invalid-feedback">
                        Please select a child.
                    </div>
                </div>

                <!-- HOSPITAL -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">🏥 Select Hospital</label>
                    <select name="hospital" class="form-select" required>
                        <option value="">Choose Hospital</option>
                        {% for h in hospitals %}
                        <option value="{{ h.id }}">{{ h.user.username }}</option>
                        {% endfor %}
                    </select>
                    <div class="invalid-feedback">
                        Please select a hospital.
                    </div>
                </div>

                <!-- VACCINE -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">💉 Select Vaccine</label>
                    <select name="vaccine" class="form-select" required>
                        <option value="">Choose Vaccine</option>
                        {% for v in vaccines %}
                        <option value="{{ v.id }}">{{ v.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="invalid-feedback">
                        Please select a vaccine.
                    </div>
                </div>

                <!-- DATE -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">📅 Appointment Date</label>
                    <input type="date" name="date" class="form-control" required>
                    <div class="invalid-feedback">
                        Please choose appointment date.
                    </div>
                </div>

                <button type="submit" class="btn btn-medical w-100">
                    <i class="bi bi-calendar-check"></i> Confirm Booking
                </button>

            </form>

        </div>

    </div>
</div>

<!-- Validation Script -->
<script>
    const form = document.getElementById('appointmentForm');

    form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }
        form.classList.add('was-validated');
    });
</script>

</body>
</html>
