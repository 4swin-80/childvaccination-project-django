<!DOCTYPE html>
<html>
<head>
    <title>Edit Child</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eaf4f8, #f6fbff);
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-custom {
            background: linear-gradient(90deg,rgba(0, 9, 102, 0.9),rgba(0, 82, 102, 0.9));
            backdrop-filter: blur(8px);
        }

        .edit-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 119, 182, 0.15);
            padding: 40px;
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
        }

        .btn-medical {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-medical:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.4);
        }

        .back-link {
            text-decoration: none;
            color: #0077b6;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
        .btn-back {
            transition: all 0.3s ease;
            border-width: 2px;
        }
        
        .btn-back:hover {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            color: white !important;
            border-color: transparent;
            transform: translateX(-5px);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.3);
        }        
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            👶 Edit Child
        </span>

        <div>
            <a href="{% url 'parent_dashboard' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="{% url 'logout' %}" class="btn btn-danger">
                <i class="bi bi-power"></i> Logout
            </a>
        </div>
    </div>
</nav>
<br>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 85vh;">

    <div class="col-md-6">

        <div class="edit-card">

            <h3 class="text-center text-primary fw-bold mb-4">
                ✏️ Update Child Information
            </h3>

            <form method="POST" novalidate>
                {% csrf_token %}

                <!-- Name -->
                <div class="form-floating mb-3">
                    <input type="text"
                           name="name"
                           value="{{ child.name }}"
                           class="form-control"
                           id="childName"
                           placeholder="Child Name"
                           required>
                    <label for="childName">Child Name</label>
                </div>

                <!-- DOB -->
                <div class="form-floating mb-3">
                    <input type="date"
                           name="dob"
                           value="{{ child.dob|date:'Y-m-d' }}"
                           class="form-control"
                           id="dob"
                           required>
                    <label for="dob">Date of Birth</label>
                </div>

                <!-- Gender -->
                <div class="form-floating mb-3">
                    <select name="gender" class="form-select" id="gender" required>
                        <option value="">Select Gender</option>

                        {% for g in genders %}
                            <option value="{{ g }}"
                                {% if child.gender == g %}selected{% endif %}>
                                {{ g }}
                            </option>
                        {% endfor %}

                    </select>
                    <label for="gender">Gender</label>
                </div>

                <!-- Blood Group -->
                <div class="form-floating mb-4">
                    <select name="blood_group" class="form-select" id="bloodGroup" required>
                        <option value="">Select Blood Group</option>

                        {% for bg in blood_groups %}
                            <option value="{{ bg }}"
                                {% if child.blood_group == bg %}selected{% endif %}>
                                {{ bg }}
                            </option>
                        {% endfor %}

                    </select>
                    <label for="bloodGroup">Blood Group</label>
                </div>

                <button type="submit" class="btn btn-medical w-100">
                    <i class="bi bi-check-circle"></i> Update Information
                </button>

            </form>

            <div class="text-center mt-4">

                <a href="{% url 'parent_dashboard' %}" 
                   class="btn btn-outline-primary btn-back px-4 py-2 rounded-pill">
            
                    <i class="bi bi-arrow-left-circle me-2"></i>
                    Back to Dashboard
            
                </a>
            
            </div>
            

        </div>

    </div>
</div>

</body>
</html>
