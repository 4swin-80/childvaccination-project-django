<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eaf4f8, #f6fbff);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(90deg,rgba(0, 9, 102, 0.9),rgba(0, 82, 102, 0.9));
            backdrop-filter: blur(8px);
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 119, 182, 0.15);
            padding: 40px;
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Fade animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Inputs */
        .form-control {
            border-radius: 12px;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #00b4d8;
            box-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
        }

        textarea.form-control {
            resize: none;
        }

        /* Readonly field */
        .readonly-field {
            background-color: #f1f9fc;
            font-weight: 500;
        }

        /* Button */
        .btn-medical {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-medical:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.4);
        }

        /* Shake invalid */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .is-invalid {
            animation: shake 0.3s;
        }

        .back-link {
            text-decoration: none;
            color: #0077b6;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            👤 Edit Profile
        </span>

        <div>
            <a href="{% url 'parent_profile' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-person-circle"></i> Profile
            </a>
            <a href="{% url 'logout' %}" class="btn btn-danger">
                <i class="bi bi-power"></i> Logout
            </a>
        </div>
    </div>
</nav>


<div class="container d-flex justify-content-center align-items-center"
     style="min-height: 85vh;">

    <div class="col-md-6">

        <div class="profile-card">

            <h3 class="text-center text-primary fw-bold mb-4">
                ✏️ Update Profile Information
            </h3>

            <form method="POST" id="profileForm" novalidate>
                {% csrf_token %}

                <!-- Username (Readonly) -->
                <div class="form-floating mb-3">
                    <input type="text"
                           class="form-control readonly-field"
                           value="{{ request.user.username }}"
                           readonly>
                    <label>Username (Cannot be changed)</label>
                </div>

<!-- Phone -->
<div class="form-floating mb-3">
    <input type="tel"
           name="phone"
           value="{{ request.user.phone }}"
           class="form-control"
           id="phone"
           placeholder="Phone"
           pattern="[0-9]{10}"
           maxlength="10"
           required>
    <label for="phone">Phone Number</label>

    <div class="invalid-feedback">
        Enter a valid 10-digit phone number.
    </div>
</div>



                <!-- Address -->
                <div class="form-floating mb-4">
                    <textarea name="address"
                              class="form-control"
                              id="address"
                              placeholder="Address"
                              style="height: 120px;"
                              required>{{ request.user.address }}</textarea>
                    <label for="address">Address</label>
                    <div class="invalid-feedback">
                        Please enter address.
                    </div>
                </div>

                <!-- Update Button -->
                <button type="submit" class="btn btn-medical w-100">
                    <i class="bi bi-check-circle"></i> Update Profile
                </button>

            </form>

            <div class="text-center mt-4">
                <a href="{% url 'parent_profile' %}" class="back-link">
                    ← Back to Profile
                </a>
            </div>

        </div>

    </div>
</div>

<!-- Validation Script -->
<script>
    const form = document.getElementById('profileForm');
    const phoneInput = document.getElementById('phone');

    // Exactly 10 digits (0–9 only)
    const phonePattern = /^[0-9]{10}$/;

    // Real-time validation
    phoneInput.addEventListener('input', function () {

        if (phonePattern.test(phoneInput.value)) {
            phoneInput.classList.remove('is-invalid');
            phoneInput.classList.add('is-valid');
        } else {
            phoneInput.classList.remove('is-valid');
            phoneInput.classList.add('is-invalid');
        }
    });

    // Form submit validation
    form.addEventListener('submit', function (event) {

        if (!phonePattern.test(phoneInput.value)) {
            event.preventDefault();
            event.stopPropagation();
            phoneInput.classList.add('is-invalid');
        }

        form.classList.add('was-validated');
    });
</script>




</body>
</html>
