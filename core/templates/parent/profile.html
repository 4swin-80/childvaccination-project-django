<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #eaf4f8, #f6fbff);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(90deg,rgba(0, 9, 102, 0.9),rgba(0, 82, 102, 0.9));
            backdrop-filter: blur(8px);
        }

        /* Profile Card */
        .profile-card {
            background: white;
            width: 420px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 119, 182, 0.15);
            text-align: center;
            animation: fadeInUp 0.8s ease forwards;
        }

        /* Fade Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }

        .avatar-wrapper img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #00b4d8;
            transition: 0.3s;
        }

        .avatar-wrapper img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
        }

        /* Info */
        .profile-info {
            text-align: left;
            margin-top: 25px;
        }

        .profile-info p {
            margin: 12px 0;
            font-size: 15px;
        }

        /* Children Badge */
        .children-badge {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        /* Button */
        .btn-medical {
            background: linear-gradient(45deg, #0077b6, #00b4d8);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-medical:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 216, 0.4);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            👤 My Profile
        </span>

        <div>
            <a href="{% url 'parent_dashboard' %}" class="btn btn-outline-light me-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="{% url 'logout' %}" class="btn btn-danger">
                <i class="bi bi-power"></i> Logout
            </a>
        </div>
    </div>
</nav>


<div class="d-flex justify-content-center align-items-center"
     style="min-height: 90vh;">

    <div class="profile-card">

        <!-- Avatar -->
        <div class="avatar-wrapper mb-3">
            {% if request.user.photo %}
                <img src="{{ request.user.photo.url }}">
            {% else %}
                <img src="https://via.placeholder.com/140">
            {% endif %}
        </div>

        <h4 class="fw-bold text-primary">
            {{ request.user.username }}
        </h4>

        <!-- Info -->
        <div class="profile-info mt-4">

            <p>
                <i class="bi bi-telephone-fill text-primary me-2"></i>
                <strong>Phone:</strong>
                {{ request.user.phone }}
            </p>

            <p>
                <i class="bi bi-geo-alt-fill text-primary me-2"></i>
                <strong>Address:</strong>
                {{ request.user.address }}
            </p>

            <p>
                <i class="bi bi-people-fill text-primary me-2"></i>
                <strong>Children:</strong>
                <span class="children-badge">
                    {{ children_count }}
                </span>
            </p>

        </div>

        <div class="mt-4">
            <a href="{% url 'edit_parent_profile' %}" class="btn btn-medical">
                <i class="bi bi-pencil-square"></i> Edit Profile
            </a>
        </div>

    </div>

</div>


</body>
</html>
