<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg,rgb(8, 23, 96),rgb(8, 93, 7));
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 45px;
            width: 400px;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: fadeInScale 0.6s ease forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
            color: white;
        }

        .btn-login {
            background: linear-gradient(45deg,rgb(0, 0, 0),rgb(0, 0, 0));
            border: none;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(4, 196, 255, 0.4);
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
        }

        .back-link {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: white;
        }
        #metamorphous-regular {
            font-family: "Metamorphous", serif;
            font-weight: 800;
            font-style: normal;
          }
    </style>
</head>

<body>

<div class="login-card">

    <h3 class="text-center fw-bold mb-4" id="metamorphous-regular">
        🔐Login
    </h3>

    {% if error %}
        <div class="error-message mb-3 text-center">
            {{ error }}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-3 position-relative">
            <input type="password"
                   name="password"
                   id="password"
                   class="form-control"
                   placeholder="Password"
                   required>

            <span style="position:absolute; right:12px; top:12px; cursor:pointer;"
                  onclick="togglePassword()">
                <i class="bi bi-eye" id="toggleIcon"></i>
            </span>
        </div>

        <button type="submit" class="btn btn-login w-100">
            Login
        </button>
    </form>

    <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="back-link">
            ← Back to Home
        </a>
    </div>

</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.remove("bi-eye");
            icon.classList.add("bi-eye-slash");
        } else {
            passwordInput.type = "password";
            icon.classList.remove("bi-eye-slash");
            icon.classList.add("bi-eye");
        }
    }
</script>

</body>
</html>
